version: "3.9"

services:
  airflow-init:
    image: "apache/airflow:2.9.3"
    container_name: "airflow-init"
    user: "50000:0"
    entrypoint: "/bin/bash"
    command: >
      -lc "airflow db migrate &&
           airflow users create
           --username ${AIRFLOW_ADMIN_USER}
           --firstname Admin
           --lastname User
           --role Admin
           --email ${AIRFLOW_ADMIN_EMAIL}
           --password ${AIRFLOW_ADMIN_PASSWORD}"
    environment:
      - "TZ=${TZ}"
      - "AIRFLOW__CORE__EXECUTOR=LocalExecutor"
      - "AIRFLOW__CORE__LOAD_EXAMPLES=false"
      - "AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags"
      - "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}"
      - "AIRFLOW__WEBSERVER__EXPOSE_CONFIG=false"
    volumes:
      - "${DATA_PATH}/airflow/dags:/opt/airflow/dags"
      - "${DATA_PATH}/airflow/logs:/opt/airflow/logs"
      - "${DATA_PATH}/airflow/plugins:/opt/airflow/plugins"
    restart: "no"
    env_file:
      - ../envs/base.env

  airflow-webserver:
    image: "apache/airflow:2.9.3"
    container_name: "airflow-webserver"
    user: "50000:0"
    command: "webserver"
    environment:
      - "TZ=${TZ}"
      - "AIRFLOW__CORE__EXECUTOR=LocalExecutor"
      - "AIRFLOW__CORE__LOAD_EXAMPLES=false"
      - "AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags"
      - "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}"
      - "AIRFLOW__WEBSERVER__EXPOSE_CONFIG=false"
      - "AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}"
      - "VIRTUAL_HOST=airflow.orochi.chst.dev"
      - "VIRTUAL_PORT=8080"
    volumes:
      - "${DATA_PATH}/airflow/dags:/opt/airflow/dags"
      - "${DATA_PATH}/airflow/logs:/opt/airflow/logs"
      - "${DATA_PATH}/airflow/plugins:/opt/airflow/plugins"
    restart: "unless-stopped"
    env_file:
      - ../envs/base.env

  airflow-scheduler:
    image: "apache/airflow:2.9.3"
    container_name: "airflow-scheduler"
    user: "50000:0"
    command: "scheduler"
    environment:
      - "TZ=${TZ}"
      - "AIRFLOW__CORE__EXECUTOR=LocalExecutor"
      - "AIRFLOW__CORE__LOAD_EXAMPLES=false"
      - "AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags"
      - "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}"
    volumes:
      - "${DATA_PATH}/airflow/dags:/opt/airflow/dags"
      - "${DATA_PATH}/airflow/logs:/opt/airflow/logs"
      - "${DATA_PATH}/airflow/plugins:/opt/airflow/plugins"
    restart: "unless-stopped"
    env_file:
      - ../envs/base.env

  airflow-triggerer:
    image: "apache/airflow:2.9.3"
    container_name: "airflow-triggerer"
    user: "50000:0"
    command: "triggerer"
    environment:
      - "TZ=${TZ}"
      - "AIRFLOW__CORE__EXECUTOR=LocalExecutor"
      - "AIRFLOW__CORE__LOAD_EXAMPLES=false"
      - "AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags"
      - "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}"
    volumes:
      - "${DATA_PATH}/airflow/dags:/opt/airflow/dags"
      - "${DATA_PATH}/airflow/logs:/opt/airflow/logs"
      - "${DATA_PATH}/airflow/plugins:/opt/airflow/plugins"
    restart: "unless-stopped"
    env_file:
      - ../envs/base.env

networks:
  default:
    name: lsio
    external: true
